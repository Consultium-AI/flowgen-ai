# One-time setup (Vercel dashboard):
# 1) Account → Settings → Tokens → create token (scope: Full account or deploy).
# 2) Project qozenai / flowgen-ai → Settings → General → copy Project ID & Team (Org) ID.
# GitHub repo Consultium-AI/flowgen-ai → Settings → Secrets → Actions:
#    VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
name: Vercel Production Deploy
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@39.4.2

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
